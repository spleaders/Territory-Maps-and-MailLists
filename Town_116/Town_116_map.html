var _parcelLayers={};

function getPopup(p) {
  var badge = '';
  if (p.dnc === 'YES') badge = '<span class="popup-badge badge-dnc">DO NOT CONTACT</span>';
  else if (p.sheet === 'Institutions') badge = '<span class="popup-badge badge-inst">' + p.btype + '</span>';
  else if (p.sheet === 'Vacant') badge = '<span class="popup-badge badge-vacant">Vacant</span>';
  else if (p.btype === 'Commercial / Rental') badge = '<span class="popup-badge badge-biz">Business</span>';
  else if (p.occupied === 'Yes') badge = '<span class="popup-badge badge-owner">Owner Occupied</span>';
  if (p.research === 'Yes') badge += '<span class="popup-badge badge-research">Research Needed</span>';

  var mailHtml = p.mail ? '<div class="popup-mail"> ' + p.mail + '</div>' : '';
  var saluteHtml = p.salute && p.salute !== 'nan' ? '<div class="popup-mail" style="color:#888">Salutation: ' + p.salute + '</div>' : '';
  var mapsUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(p.site + ', Fond du Lac, WI');
  var viewUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(p.site + ', Fond du Lac, WI');
  var mapsHtml = p.site ? '<div style="margin-top:6px"><a href="' + mapsUrl + '" target="_blank" style="font-size:12px;color:#1a73e8;text-decoration:none;">&#x1F4CD; Get Directions</a></div>' : '';

  return '<div class="popup-inner">' +
    '<div class="popup-mapid">Parcel #' + p.mapid + '</div>' +
    '<div class="popup-site">' + p.site + '</div>' +
    '<div class="popup-owner">' + p.owner + '</div>' +
    mailHtml + saluteHtml +
    mapsHtml +
    '<div style="margin-top:6px">' + badge + '</div>' +
    '</div>';
}

function getParcelArea(feature) {
  var coords = feature.geometry.coordinates;
  var allPoints = [];
  function collectPoints(c) {
    if (typeof c[0] === 'number') { allPoints.push(c); }
    else { c.forEach(collectPoints); }
  }
  collectPoints(coords);
  if (allPoints.length < 2) return 0;
  var lats = allPoints.map(function(p) { return p[1]; });
  var lngs = allPoints.map(function(p) { return p[0]; });
  return (Math.max.apply(null,lats)-Math.min.apply(null,lats)) * (Math.max.apply(null,lngs)-Math.min.apply(null,lngs));
}
function getOpacity(feature) {
  return 1.0;
}
// Store per-parcel area for label sizing
var parcelAreas = {};
parcelsData.features.forEach(function(f) {
  parcelAreas[f.properties.mapid] = getParcelArea(f);
});

L.geoJSON(parcelsData, {
  style: function(feature) {
    var p = feature.properties;
    return {
      fillColor: p.fill,
      fillOpacity: getOpacity(feature),
      color: 'rgba(0,0,0,0.65)',
      weight: 2.0
    };
  },
  onEachFeature: function(feature, layer) {
    var p = feature.properties;
    _parcelLayers[p.mapid]=layer;
    layer._origStyle={
      fillColor:layer.options.fillColor,
      fillOpacity:layer.options.fillOpacity,
      color:layer.options.color,
      weight:layer.options.weight
    };
    layer.bindPopup(getPopup(p), {maxWidth: 300});
    var area = getParcelArea(feature);
    // Store area on tooltip element for zoom-aware sizing
    var tt = layer.bindTooltip(String(p.mapid), {
      permanent: true, direction: 'center',
      className: 'mapid-label',
      offset: [0, 0]
    });
    layer.on('tooltipopen', function(e) {
      e.tooltip.getElement().setAttribute('data-area', area);
    });
  }
}).addTo(map);

if (buildingsData) {
  L.geoJSON(buildingsData, {
    style: {
      fillColor: '#000000',
      fillOpacity: 1.0,
      color: '#000000',
      weight: 1.5
    },
    interactive: isApartment,
    onEachFeature: isApartment ? function(feature, layer) {
      var p = feature.properties;
      if (p.site && p.site !== '') {
        var subLabel = p.subid ? p.subid.toUpperCase() : ('Parcel #' + p.mapid);
        var saluteHtml = p.salute && p.salute !== 'nan' && p.salute !== ''
          ? '<div class="popup-mail" style="color:#888">Salutation: ' + p.salute + '</div>' : '';
        var html = '<div class="popup-inner">' +
          '<div class="popup-mapid">Building ' + subLabel + '</div>' +
          '<div class="popup-site">' + p.site + '</div>' +
          '<div class="popup-owner">' + (p.owner || '') + '</div>' +
          saluteHtml +
          '</div>';
        layer.bindPopup(html, {maxWidth: 300});
      }
    } : function(feature, layer) {}
  }).addTo(map);
}

if (!boundaryData) {
  map.setView([43.77, -88.43], 14);
}

// Scale MapID labels by zoom level AND parcel area
function updateLabelSizes() {
  var z = map.getZoom();
  // Base size from zoom
  var baseSize;
  if      (z <= 13) baseSize = 11;
  else if (z <= 14) baseSize = 15;
  else if (z <= 15) baseSize = 19;
  else if (z <= 16) baseSize = 24;
  else              baseSize = 30;
  document.querySelectorAll('.mapid-label').forEach(function(el) {
    var area = parseFloat(el.getAttribute('data-area') || 0);
    var scale = 1.0;
    // Shrink labels for small parcels
    if      (area < 0.000003) scale = 0.45;
    else if (area < 0.000008) scale = 0.60;
    else if (area < 0.00002)  scale = 0.75;
    else if (area < 0.00006)  scale = 0.88;
    var finalSize = Math.max(7, Math.round(baseSize * scale));
    el.style.fontSize = finalSize + 'px';
  });
}
map.on('zoomend', updateLabelSizes);
map.on('load', updateLabelSizes);
setTimeout(updateLabelSizes, 500);

<script>
var _allRows=[];
var _sortState={conf:{col:-1,asc:true},ver:{col:-1,asc:true},res:{col:-1,asc:true},dnc:{col:-1,asc:true}};

function _doneKey(mid){return 'done_'+_TERRITORY+'_'+mid;}
function _isDone(mid){return localStorage.getItem(_doneKey(mid))==='1';}
function _setDone(mid,done){if(done)localStorage.setItem(_doneKey(mid),'1');else localStorage.removeItem(_doneKey(mid));}

function _toggleDone(mid){
  var done=!_isDone(mid);
  _setDone(mid,done);
  _updateParcel(mid,done);
  _updateTableRow(mid,done);}

function _updateParcel(mid,done){
  var lyr=_parcelLayers[mid];
  if(lyr){
    if(done){lyr.setStyle({fillColor:'#222222',fillOpacity:0.75,color:'#FFFFFF',weight:4});}
    else{lyr.setStyle(lyr._origStyle||{fillColor:'#AAAAAA',fillOpacity:0.4,color:'rgba(0,0,0,0.65)',weight:2.0});}}}

function _updateTableRow(mid,done){
  document.querySelectorAll('.ml-check[data-mid="'+mid+'"]').forEach(function(el){
    el.textContent=done?'☑':'☐';});
  document.querySelectorAll('.ml-row[data-mid="'+mid+'"]').forEach(function(el){
    el.style.opacity=done?'0.45':'';});}

function _applyDoneState(){
  // Clear done state if this is a freshly generated map (build timestamp changed)
  var buildKey='build_'+_TERRITORY;
  var lastBuild=localStorage.getItem(buildKey);
  if(lastBuild!==_BUILD_TS){
    // New pipeline run - clear all done state for this territory
    var toRemove=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.indexOf('done_'+_TERRITORY+'_')===0)toRemove.push(k);}
    toRemove.forEach(function(k){localStorage.removeItem(k);});
    localStorage.setItem(buildKey,_BUILD_TS);}
  tableData.forEach(function(p){if(_isDone(p.mapid))_updateParcel(p.mapid,true);});
  var m=window.location.hash.match(/done=([0-9,]+)/);
  if(m){m[1].split(',').forEach(function(s){
    var mid=parseInt(s);
    if(!isNaN(mid)){_setDone(mid,true);_updateParcel(mid,true);}});}}
setTimeout(_applyDoneState,400);

function shareProgress(){
  var done=[];
  tableData.forEach(function(p){if(_isDone(p.mapid))done.push(p.mapid);});
  if(!done.length){alert('No parcels checked off yet.');return;}
  var url=window.location.href.split('#')[0]+'#done='+done.join(',');
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){
      alert('Progress link copied!\nPaste it into an email to share your progress.');});}
  else{prompt('Copy this link to share your progress:',url);}}

function _sortIndicator(sec,idx){
  if(idx===0)return '';
  var s=_sortState[sec];
  if(s.col!==idx)return ' ▸';
  return s.asc?' ▲':' ▼';}

function _colHdr(sec){
  var isConf=(sec==='conf');
  var cols=isConf
    ?['','MapID','Owner 1','Owner 2','Site Address']
    :['','MapID','Owner 1','Owner 2','Site Address','Reason/Notes'];
  var grid=isConf?'30px 60px 200px 200px 380px':'30px 60px 180px 180px 300px 220px';
  var h='<div class="ml-col-header" style="grid-template-columns:'+grid+'">';
  cols.forEach(function(c,i){
    if(i===0){h+='<span></span>';return;}
    h+='<span data-sec="'+sec+'" data-col="'+i+'" onclick="_sortSection(this.dataset.sec,parseInt(this.dataset.col))" title="Sort by '+c+'">'+c+_sortIndicator(sec,i)+'</span>';});
  h+='</div>';
  return h;}

function _sortSection(sec,col){
  if(col===0)return;
  var s=_sortState[sec];
  if(s.col===col){s.asc=!s.asc;}else{s.col=col;s.asc=true;}
  renderTable(_allRows);}

function _sortRows(arr,sec){
  var s=_sortState[sec];
  if(s.col<=0)return arr.slice();
  var cols=(sec==='conf')
    ?['','mapid','owner','owner2','site_full']
    :['','mapid','owner','owner2','site_full','notes'];
  var key=cols[s.col]||'mapid';
  return arr.slice().sort(function(a,b){
    var av,bv;
    if(key==='site_full'){
      av=((a.site||'')+(a.site_city||'')+(a.site_state||'')+(a.site_zip||'')).toLowerCase();
      bv=((b.site||'')+(b.site_city||'')+(b.site_state||'')+(b.site_zip||'')).toLowerCase();}
    else if(key==='mapid'){av=parseInt(a.mapid||0);bv=parseInt(b.mapid||0);}
    else{av=String(a[key]||'').toLowerCase();bv=String(b[key]||'').toLowerCase();}
    if(av<bv)return s.asc?-1:1;
    if(av>bv)return s.asc?1:-1;
    return 0;});}

function _row(p,cls,sec){
  var isConf=(sec==='conf');
  var mid=p.mapid;
  var done=_isDone(mid);
  var sf=(p.site||'')+(p.site_city?', '+p.site_city:'')+(p.site_state?' '+p.site_state:'')+(p.site_zip?' '+p.site_zip:'');
  var grid=isConf?'30px 60px 200px 200px 380px':'30px 60px 180px 180px 300px 220px';
  var rowStyle=done?'opacity:0.45;':'';
  var r='<div class="ml-row '+cls+'" data-mid="'+mid+'" style="grid-template-columns:'+grid+';'+rowStyle+'">';
  r+='<span class="ml-check" data-mid="'+mid+'" onclick="_toggleDone('+mid+')" style="cursor:pointer;text-align:center;font-size:15px;user-select:none;">'+(done?'☑':'☐')+'</span>';
  r+='<span>'+mid+'</span>';
  r+='<span>'+(p.owner||'')+'</span>';
  r+='<span>'+(p.owner2||'')+'</span>';
  r+='<span>'+sf+'</span>';
  if(!isConf){r+='<span>'+(p.notes||'')+'</span>';}
  r+='</div>';
  return r;}

function setParcelOpacity(val){
  document.getElementById('opacity-val').textContent=Math.round(val*100)+'%';
  Object.keys(_parcelLayers).forEach(function(mid){
    var lyr=_parcelLayers[mid];
    if(lyr&&!_isDone(parseInt(mid))){
      lyr.setStyle({fillOpacity:val});}});}

function buildTable(){_allRows=tableData.slice();renderTable(_allRows);}

function filterTable(){
  var q=document.getElementById('search-box').value.toLowerCase();
  renderTable(_allRows.filter(function(p){
    var sf=(p.site||'')+(p.site_city||'')+(p.site_state||'')+(p.site_zip||'');
    return [p.mapid,p.owner,p.owner2,sf,p.notes].join(' ').toLowerCase().indexOf(q)>=0;}));}

function renderTable(rows){
  var conf=[],res=[],dnc=[];
  rows.forEach(function(p){
    if(p.dnc==='YES'){dnc.push(p);}
    else if(p.occupied==='Yes'&&p.confidence==='High'&&p.research!=='Yes'){conf.push(p);}
    else{res.push(p);}});
  conf=_sortRows(conf,'conf');res=_sortRows(res,'res');dnc=_sortRows(dnc,'dnc');
  var h='';
  h+='<div class=ml-hdr style="background:#375623">✔ CONFIDENT RESIDENTS ('+conf.length+' parcels) — Ready to write letters</div>';
  h+=_colHdr('conf');
  conf.forEach(function(p,i){h+=_row(p,i%2===0?'ml-even-g':'ml-odd','conf');});
  if(!conf.length)h+='<div class=ml-none>None</div>';
  h+='<div class=ml-gap></div>';
  h+='<div class=ml-hdr style="background:#7F6000">? NEEDS RESEARCH ('+res.length+' parcels) — Verify before writing</div>';
  h+=_colHdr('res');
  res.forEach(function(p,i){h+=_row(p,i%2===0?'ml-even-y':'ml-odd','res');});
  if(!res.length)h+='<div class=ml-none>None</div>';
  h+='<div class=ml-gap></div>';
  h+='<div class=ml-hdr style="background:#C00000">✘ DO NOT CALL ('+dnc.length+' parcels)</div>';
  h+=_colHdr('dnc');
  dnc.forEach(function(p){h+=_row(p,'ml-dnc','dnc');});
  if(!dnc.length)h+='<div class=ml-none>None</div>';
  document.getElementById('table-body').innerHTML=h;}

function showTab(tab){
  document.getElementById('map').style.display=tab==='map'?'block':'none';
  document.getElementById('table-view').style.display=tab==='table'?'block':'none';
  if(tab==='map'){setTimeout(function(){map.invalidateSize();},100);}
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active',(tab==='map'&&i===0)||(tab==='table'&&i===1));});
  if(tab==='table'&&!window._tableBuilt){buildTable();window._tableBuilt=true;}}
