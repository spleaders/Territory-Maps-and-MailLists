body { font-family: Arial, sans-serif; background: #f0f0f0; }
#header {

#header h1 { font-size: 17px; font-weight: bold; margin: 0; line-height: 1.2; }
#header .subtitle { font-size: 10px; opacity: 0.75; margin-top: 1px; }
#header .stats { font-size: 12px; opacity: 0.9; }
#map { height: calc(100vh - 96px); width: 100%; display: block; }
.leaflet-popup-content-wrapper {

  border-left: 6px solid #E53935;

}
.leaflet-popup-content { margin: 0; width: 360px !important; }
.popup-inner { padding: 18px 22px; }
.popup-mapid {
  font-size: 14px; color: #888; text-transform: uppercase;

}
.popup-site {
  font-size: 20px; font-weight: bold; color: #E53935;

.popup-owner { font-size: 17px; color: #222; margin-bottom: 4px; }
.popup-mail { font-size: 17px; color: #555; margin-bottom: 10px; }

.badge-owner  { background: #E53935; }

.badge-dnc    { background: #cc0000; }
.badge-research { background: #E65100; }

#tab-bar {

}
.tab-btn {

}
.tab-btn.active {

}

#table-view {

}

  background: #ddd; border-radius: 6px;
}
#table-view::-webkit-scrollbar-thumb {
  background: #888; border-radius: 6px;
}
#table-view::-webkit-scrollbar-thumb:hover {
  background: #555;
}

  font-size: 14px; margin-bottom: 12px;

#data-table {

  table-layout: fixed;
  background: white; font-size: 13px;
}
#table-wrapper {
  display: block; overflow-x: auto;
  border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
#data-table th {
  background: #E53935; color: white;
  padding: 10px 12px; text-align: left;
  cursor: pointer; white-space: nowrap;
  user-select: none; position: sticky;
  top: 0; z-index: 10; min-width: 60px;
}
#data-table th:hover { opacity: 0.85; }
#data-table th.sort-asc::after { content: " "; font-size: 10px; }
#data-table th.sort-desc::after { content: " "; font-size: 10px; }
#data-table td {
  padding: 8px 12px; border-bottom: 1px solid #eee;
  vertical-align: top; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  max-width: 0;
}
#data-table td:hover {
  white-space: normal; overflow: visible;
  background: #fffde7; position: relative; z-index: 5;
}
#data-table th {
  position: sticky; top: 0; z-index: 10;
  resize: horizontal; overflow: auto;
  min-width: 40px;
}

function getPopup(p) {
  var badge = '';
  if (p.dnc === 'YES') badge = '<span class="popup-badge badge-dnc">DO NOT CONTACT</span>';
  else if (p.sheet === 'Institutions') badge = '<span class="popup-badge badge-inst">' + p.btype + '</span>';
  else if (p.sheet === 'Vacant') badge = '<span class="popup-badge badge-vacant">Vacant</span>';
  else if (p.btype === 'Commercial / Rental') badge = '<span class="popup-badge badge-biz">Business</span>';
  else if (p.occupied === 'Yes') badge = '<span class="popup-badge badge-owner">Owner Occupied</span>';
  if (p.research === 'Yes') badge += '<span class="popup-badge badge-research">Research Needed</span>';

  var mailHtml = p.mail ? '<div class="popup-mail"> ' + p.mail + '</div>' : '';
  var saluteHtml = p.salute && p.salute !== 'nan' ? '<div class="popup-mail" style="color:#888">Salutation: ' + p.salute + '</div>' : '';
  var mapsUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(p.site + ', Fond du Lac, WI');
  var mapsHtml = p.site ? '<div style="margin-top:6px"><a href="' + mapsUrl + '" target="_blank" style="font-size:12px;color:#1a73e8;text-decoration:none;">&#x1F4CD; Get Directions</a></div>' : '';

  return '<div class="popup-inner">' +
    '<div class="popup-mapid">Parcel #' + p.mapid + '</div>' +
    '<div class="popup-site">' + p.site + '</div>' +
    '<div class="popup-owner">' + p.owner + '</div>' +
    mailHtml + saluteHtml +
    mapsHtml +
    '<div style="margin-top:6px">' + badge + '</div>' +
    '</div>';
}

function getParcelArea(feature) {
  var coords = feature.geometry.coordinates;
  var allPoints = [];
  function collectPoints(c) {
    if (typeof c[0] === 'number') { allPoints.push(c); }
    else { c.forEach(collectPoints); }
  }
  collectPoints(coords);
  if (allPoints.length < 2) return 0;
  var lats = allPoints.map(function(p) { return p[1]; });
  var lngs = allPoints.map(function(p) { return p[0]; });
  return (Math.max.apply(null,lats)-Math.min.apply(null,lats)) * (Math.max.apply(null,lngs)-Math.min.apply(null,lngs));
}
function getOpacity(feature) {
  var area = getParcelArea(feature);
  if (area < 0.000005) return 0.35;
  if (area < 0.00005)  return 0.25;
  if (area < 0.0002)   return 0.18;
  return 0.12;
}
// Store per-parcel area for label sizing
var parcelAreas = {};
parcelsData.features.forEach(function(f) {
  parcelAreas[f.properties.mapid] = getParcelArea(f);
});

L.geoJSON(parcelsData, {
  style: function(feature) {
    var p = feature.properties;
    return {
      fillColor: p.fill,
      fillOpacity: getOpacity(feature),
      color: 'rgba(0,0,0,0.65)',
      weight: 2.0
    };
  },
  onEachFeature: function(feature, layer) {
    var p = feature.properties;
    layer.bindPopup(getPopup(p), {maxWidth: 300});
    var area = getParcelArea(feature);
    // Store area on tooltip element for zoom-aware sizing
    var tt = layer.bindTooltip(String(p.mapid), {
      permanent: true, direction: 'center',
      className: 'mapid-label',
      offset: [0, 0]
    });
    layer.on('tooltipopen', function(e) {
      e.tooltip.getElement().setAttribute('data-area', area);
    });
  }
}).addTo(map);

if (!boundaryData) {
  map.setView([43.77, -88.43], 14);
}

// Scale MapID labels by zoom level AND parcel area
function updateLabelSizes() {
  var z = map.getZoom();
  // Base size from zoom
  var baseSize;
  if      (z <= 13) baseSize = 11;
  else if (z <= 14) baseSize = 15;
  else if (z <= 15) baseSize = 19;
  else if (z <= 16) baseSize = 24;
  else              baseSize = 30;
  document.querySelectorAll('.mapid-label').forEach(function(el) {
    var area = parseFloat(el.getAttribute('data-area') || 0);
    var scale = 1.0;
    // Shrink labels for small parcels
    if      (area < 0.000003) scale = 0.45;
    else if (area < 0.000008) scale = 0.60;
    else if (area < 0.00002)  scale = 0.75;
    else if (area < 0.00006)  scale = 0.88;
    var finalSize = Math.max(7, Math.round(baseSize * scale));
    el.style.fontSize = finalSize + 'px';
  });
}
map.on('zoomend', updateLabelSizes);
map.on('load', updateLabelSizes);
setTimeout(updateLabelSizes, 500);

  var cols=['MapID','Owner 1','Owner 2','Site Address','St','Reason/Notes','Mailing Address'];
  var h='<div class=ml-col-header>';

function _sortSection(sec,col){
  var s=_sortState[sec];

function _sortRows(arr,sec){
  var s=_sortState[sec];
  if(s.col<0)return arr.slice();
  var key=_COLS[s.col];
  return arr.slice().sort(function(a,b){
    var av=String(a[key]||'').toLowerCase();
    var bv=String(b[key]||'').toLowerCase();
    if(key==='mapid'){av=parseInt(a[key]||0);bv=parseInt(b[key]||0);}
